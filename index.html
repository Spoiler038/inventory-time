<!DOCTYPE html>
<html lang="ru">
<head>

  <style>
    :root {
      --primary-color: #e74c3c;
      --secondary-color: #2c3e50;

      --success-color: #2ecc71;
      --warning-color: #f39c12;

    .app-container {

    .app-header {

    .back-btn {

    .loader {
  border: 4px solid rgba(255, 255, 255, 0.3);

}

}

<script>
// ==================== КОНФИГУРАЦИЯ ====================
// ВАЖНО: Замените URL после публикации GAS скрипта!
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzMklgomb30rWFNb_O71CN4siElhrMKensAuW96o94g1r_35K4rlcIPYvWvBWX0NUqSXQ/exec';

const TECHNICAL_SHEETS = ['Users', 'Devices', 'Logs', 'Лист1', 'Лист2'];
const READONLY_SHEETS = ['Итого', 'Отчеты'];

const units = [{ value: 'кг', name: 'килограммы' }, { value: 'шт', name: 'штуки' }, { value: 'короб', name: 'коробки' }];

// Глобальные переменные
let currentStep = 1, userData = null, currentDepartment = null, products = [], filteredProducts = [];
let selectedProduct = null, deviceId = null, currentPhone = null, isChef = false, isInventoryActive = false;
let isReadonlyDepartment = false;
window.currentEditingProductId = null;
window.isEditingName = false;

// ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
function getDeviceId() {
  let storedId = localStorage.getItem('device_id');
  if (!storedId) {
    const navigatorInfo = navigator.userAgent + navigator.platform + navigator.language;
    const timeStamp = new Date().getTime();
    const random = Math.random().toString(36).substring(2, 15);
    let hash = 0;
    for (let i = 0; i < navigatorInfo.length; i++) {
      const char = navigatorInfo.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash = hash & hash;
    }
    storedId = `device_${Math.abs(hash)}_${timeStamp}_${random.substring(0, 8)}`;
    localStorage.setItem('device_id', storedId);
  }
  deviceId = storedId;
  return storedId;
}

function showLoader() {
  hideLoader();
  const loader = document.createElement('div');
  loader.className = 'loader';
  loader.id = 'globalLoader';
  document.body.appendChild(loader);
}

function hideLoader() {
  const loader = document.getElementById('globalLoader');
  if (loader) loader.remove();
}

function showNotification(message, type = 'success') {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => {
    notification.style.opacity = '0';
    setTimeout(() => notification.remove(), 300);
  }, 3000);
}

// ==================== API JSONP ====================
function callGAS(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
    
    const url = new URL(GAS_URL);
    url.searchParams.append('action', action);
    url.searchParams.append('callback', callbackName);
    Object.keys(params).forEach(key => {
      if (params[key] !== undefined && params[key] !== null) {
        url.searchParams.append(key, params[key].toString());
      }
    });
    
    console.log(`Calling GAS via JSONP: ${action}`, params);
    
    const timeout = setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        reject(new Error(`Timeout for ${action}`));
      }
    }, 30000);
    
    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      console.log(`GAS response for ${action}:`, data);
      resolve(data);
    };
    
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error(`JSONP request failed for ${action}`));
    };
    document.body.appendChild(script);
  });
}

// ==================== АВТОРИЗАЦИЯ ====================
async function checkSession() {
  const result = await callGAS('checkSession', { deviceId: getDeviceId() });
  if (result.success && result.phone) {
    currentPhone = result.phone;
    document.getElementById('phone').value = result.phone;
    document.getElementById('headerActions').style.display = 'block';
    await autoAuthorize(result.phone);
  } else {
    document.getElementById('headerActions').style.display = 'none';
  }
}

async function autoAuthorize(phone) {
  showLoader();
  const result = await callGAS('authorize', { phone, deviceId: getDeviceId() });
  hideLoader();
  if (!result.error) handleAuthSuccess(result);
}

async function handleAuthSubmit(e) {
  e.preventDefault();
  const phoneInput = document.getElementById('phone').value;
  const cleanPhone = phoneInput.replace(/\D/g, '');
  if (cleanPhone.length < 10) {
    showNotification('Введите корректный номер телефона', 'error');
    return;
  }
  const normalizedPhone = cleanPhone.slice(-10);
  localStorage.setItem('last_phone', normalizedPhone);
  currentPhone = normalizedPhone;
  
  showLoader();
  const result = await callGAS('authorize', { phone: cleanPhone, deviceId: getDeviceId() });
  hideLoader();
  
  if (result.error) {
    showNotification(result.error, 'error');
    return;
  }
  handleAuthSuccess(result);
}

function handleAuthSuccess(result) {
  userData = result;
  isChef = result.isChef || false;
  isInventoryActive = result.inventoryActive || false;
  
  callGAS('saveSession', { phone: currentPhone, deviceId: getDeviceId() });
  
  document.getElementById('headerActions').style.display = 'block';
  document.getElementById('userWelcome').textContent = `Добро пожаловать, ${result.user.name || 'Пользователь'}!`;
  
  const filteredDepartments = result.departments.filter(dept => !TECHNICAL_SHEETS.includes(dept));
  
  if (filteredDepartments.length === 0) {
    showNotification('Нет доступных цехов', 'error');
    return;
  }
  
  document.getElementById('headerTitle').textContent = 'Выбор цеха';
  document.getElementById('backButton').style.display = 'none';
  renderDepartments(filteredDepartments);
  
  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');
  if (step1) step1.classList.remove('active');
  if (step2) step2.classList.add('active');
  currentStep = 2;
  
  const phoneInput = document.getElementById('phone');
  if (phoneInput) phoneInput.value = '';
}

function getDepartmentClass(dept) {
  const d = dept.toLowerCase();
  if (d.includes('холодн')) return 'dept-холодн';
  if (d.includes('горяч')) return 'dept-горяч';
  if (d.includes('склад')) return 'dept-склад';
  if (d.includes('ролл') || d.includes('суши')) return 'dept-ролл';
  if (d.includes('пицца')) return 'dept-пицца';
  if (d.includes('мангал')) return 'dept-мангал';
  if (d.includes('итог')) return 'dept-итого';
  return 'dept-default';
}

function getDepartmentIcon(dept) {
  const d = dept.toLowerCase();
  if (d.includes('холодн')) return 'bi-snow2';
  if (d.includes('горяч')) return 'bi-fire';
  if (d.includes('склад')) return 'bi-box-seam';
  if (d.includes('пицца')) return 'bi-egg-fried';
  if (d.includes('мангал')) return 'bi-basket2';
  if (d.includes('итог')) return 'bi-table';
  return 'bi-building';
}

function renderDepartments(departments) {
  const container = document.getElementById('departmentsList');
  if (!container) return;
  container.innerHTML = '';
  
  departments.forEach(dept => {
    const deptClass = getDepartmentClass(dept);
    const icon = getDepartmentIcon(dept);
    const isReadonly = READONLY_SHEETS.includes(dept);
    
    const card = document.createElement('div');
    card.className = `department-card ${deptClass}`;
    card.onclick = () => selectDepartment(dept);
    card.innerHTML = `
      <div class="department-icon"><i class="bi ${icon}"></i></div>
      <div class="department-info">
        <h5>${dept}</h5>
        <p>${isReadonly ? 'Только просмотр' : 'Нажмите для входа'}</p>
      </div>
      <i class="bi bi-chevron-right ms-auto" style="color: #ccc; font-size: 18px;"></i>
    `;
    container.appendChild(card);
  });
  
  if (isChef) {
    const btnDiv = document.createElement('div');
    btnDiv.className = 'mt-3 d-grid';
    btnDiv.innerHTML = `
      <button class="btn ${isInventoryActive ? 'btn-danger' : 'btn-success'} inventory-toggle-btn" id="inventoryToggleBtn">
        <i class="bi ${isInventoryActive ? 'bi-stop-circle' : 'bi-play-circle'}"></i> 
        ${isInventoryActive ? 'Закончить инвентаризацию' : 'Начать инвентаризацию'}
      </button>
      <small class="text-muted text-center mt-1 small">${isInventoryActive ? 'Инвентаризация активна' : 'Инвентаризация не активна'}</small>
    `;
    
    const toggleBtn = btnDiv.querySelector('#inventoryToggleBtn');
    if (toggleBtn) {
      toggleBtn.onclick = () => toggleInventory();
    }
    
    container.appendChild(btnDiv);
  }
}

async function toggleInventory() {
  showLoader();
  const result = await callGAS('toggleInventory', { newStatus: !isInventoryActive });
  hideLoader();
  
  if (result.success) {
    isInventoryActive = result.inventoryActive;
    showNotification(result.message, 'success');
    
    const toggleBtn = document.getElementById('inventoryToggleBtn');
    if (toggleBtn) {
      toggleBtn.className = `btn ${isInventoryActive ? 'btn-danger' : 'btn-success'} inventory-toggle-btn`;
      toggleBtn.innerHTML = `
        <i class="bi ${isInventoryActive ? 'bi-stop-circle' : 'bi-play-circle'}"></i> 
        ${isInventoryActive ? 'Закончить инвентаризацию' : 'Начать инвентаризацию'}
      `;
      
      const smallText = toggleBtn.parentElement?.querySelector('small');
      if (smallText) {
        smallText.textContent = isInventoryActive ? 'Инвентаризация активна' : 'Инвентаризация не активна';
      }
    }
    
    if (currentDepartment) {
      renderProducts();
    }
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
}

// ==================== ВЫБОР ЦЕХА ====================
async function selectDepartment(department) {
  currentDepartment = department;
  isReadonlyDepartment = READONLY_SHEETS.includes(department);
  
  document.getElementById('headerTitle').textContent = department;
  const showBack = userData && userData.hasMultipleDepts;
  document.getElementById('backButton').style.display = showBack ? 'block' : 'none';
  
  showLoader();
  const result = await callGAS('getProducts', { department });
  hideLoader();
  
  if (result.error) {
    showNotification(result.error, 'error');
    return;
  }
  
  products = result.products || [];
  filteredProducts = [...products];
  renderProducts();
  goToStep(3);
  
  const sc = document.getElementById('searchContainer');
  if (sc) { sc.classList.add('visible', 'collapsed'); }
}

function renderProducts() {
  const container = document.getElementById('step3');
  if (!container) return;
  
  document.querySelectorAll('.readonly-notice, .alert-success').forEach(n => n.remove());
  
  if (filteredProducts.length === 0) {
    container.innerHTML = `<div class="empty-state text-center p-4"><i class="bi bi-box" style="font-size:40px;color:#ddd;"></i><h5>Нет продуктов</h5></div>`;
    return;
  }
  
  let html = '<div class="products-list">';
  filteredProducts.forEach(product => {
    const stockDisplay = product.stock > 0 ? product.stock : '0';
    
    const canEdit = !isReadonlyDepartment;
    const editIcon = (isChef && canEdit) ? `<span class="edit-icon" onclick="event.stopPropagation(); startEditName(${product.id}, '${product.name.replace(/'/g, "\\'")}', event)"><i class="bi bi-pencil"></i></span>` : '';
    const canOpenModal = (isChef && canEdit) || (isInventoryActive && canEdit);
    const clickAttr = (!window.isEditingName && canOpenModal) ? `onclick="openProductModal(${product.id})"` : '';
    const readonlyClass = isReadonlyDepartment ? 'readonly' : '';
    
    html += `
      <div class="product-card ${isChef ? 'chef-mode' : ''} ${readonlyClass}" ${clickAttr} data-id="${product.id}" style="${!canOpenModal ? 'cursor: default;' : ''}">
        <div class="product-row">
          <div class="product-name-container">
            <span class="product-name">${escapeHtml(product.name)}</span>
            ${editIcon}
          </div>
          <div class="product-stock">${stockDisplay}<span class="product-unit">${product.unit}</span></div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  container.innerHTML = html;
  
  if (isReadonlyDepartment) {
    const notice = document.createElement('div');
    notice.className = 'readonly-notice';
    notice.innerHTML = '<i class="bi bi-eye"></i> Режим только для просмотра. Изменения запрещены.';
    container.appendChild(notice);
  } else if (!isChef && !isInventoryActive) {
    const notice = document.createElement('div');
    notice.className = 'readonly-notice';
    notice.innerHTML = '<i class="bi bi-eye"></i> Режим просмотра. Инвентаризация не активна.';
    container.appendChild(notice);
  }
  
  if (isChef) {
    document.querySelectorAll('.product-card').forEach(card => card.classList.add('chef-mode'));
  }
  window.currentEditingProductId = null;
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m];
  });
}

function initUnits() {
  const container = document.getElementById('unitsContainer');
  if (!container) return;
  container.innerHTML = '';
  units.forEach(unit => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.textContent = unit.value;
    btn.addEventListener('click', function() {
      document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
    container.appendChild(btn);
  });
}

// ==================== ПОИСК ====================
function filterProducts() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredProducts = term ? products.filter(p => p.name.toLowerCase().includes(term)) : [...products];
  renderProducts();
}

function toggleSearch() {
  const container = document.getElementById('searchContainer');
  const input = document.getElementById('searchInput');
  if (container.classList.contains('collapsed')) {
    container.classList.remove('collapsed');
    if (input) { input.style.display = 'block'; setTimeout(() => input.focus(), 100); }
  } else {
    container.classList.add('collapsed');
    if (input) { input.style.display = 'none'; input.value = ''; filterProducts(); }
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  filterProducts();
}

// ==================== РЕДАКТИРОВАНИЕ НАЗВАНИЯ ====================
function startEditName(productId, currentName, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  if (!isChef) { showNotification('Только шеф-повар может редактировать названия', 'error'); return; }
  if (isReadonlyDepartment) { showNotification('Этот цех только для просмотра', 'error'); return; }
  
  closeAllEditors();
  const product = filteredProducts.find(p => p.id === productId);
  if (!product) return;
  
  const productCard = document.querySelector(`.product-card[data-id="${productId}"]`);
  if (!productCard) return;
  
  window.currentEditingProductId = productId;
  window.isEditingName = true;
  
  const nameContainer = productCard.querySelector('.product-name-container');
  nameContainer.innerHTML = `
    <div style="flex:1;">
      <input type="text" class="edit-name-input" id="editNameInput_${productId}" value="${currentName.replace(/"/g, '&quot;')}" style="width:100%;padding:6px;border:2px solid #3498db;border-radius:6px;font-size:14px;">
      <div class="edit-actions" style="margin-top:6px;display:flex;gap:6px;">
        <button class="btn btn-sm btn-success" onclick="event.stopPropagation(); saveNameEdit(${productId})"><i class="bi bi-check"></i> Сохранить</button>
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); cancelNameEdit(${productId})"><i class="bi bi-x"></i> Отмена</button>
      </div>
    </div>
  `;
  setTimeout(() => {
    const inp = document.getElementById(`editNameInput_${productId}`);
    if (inp) inp.focus();
  }, 50);
}

async function saveNameEdit(productId) {
  const newName = document.getElementById(`editNameInput_${productId}`).value.trim();
  if (!newName) { showNotification('Название не может быть пустым', 'error'); return; }
  
  const product = products.find(p => p.id === productId);
  if (!product) return;
  
  showLoader();
  const result = await callGAS('updateProductName', { departmentName: currentDepartment, rowNumber: product.row, newName });
  hideLoader();
  
  if (result.success) {
    product.name = newName;
    filteredProducts = filteredProducts.map(p => p.id === productId ? { ...p, name: newName } : p);
    renderProducts();
    showNotification('Название обновлено', 'success');
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
  window.isEditingName = false;
  window.currentEditingProductId = null;
}

function cancelNameEdit() {
  renderProducts();
  window.isEditingName = false;
  window.currentEditingProductId = null;
}

function closeAllEditors() {
  if (window.currentEditingProductId) { renderProducts(); window.currentEditingProductId = null; }
  window.isEditingName = false;
}

// ==================== МОДАЛЬНОЕ ОКНО ====================
function openProductModal(productId) {
  if (window.isEditingName) return;
  if (isReadonlyDepartment) { showNotification('Этот цех только для просмотра', 'info'); return; }
  if (!isChef && !isInventoryActive) { showNotification('Инвентаризация не активна', 'info'); return; }
  
  selectedProduct = filteredProducts.find(p => p.id === productId);
  if (!selectedProduct) return;
  
  document.getElementById('modalProductName').textContent = selectedProduct.name;
  document.getElementById('currentStockValue').textContent = `${selectedProduct.stock} ${selectedProduct.unit}`;
  document.getElementById('quantityInput').value = '';
  
  let unitToSelect = selectedProduct.defaultUnit || selectedProduct.unit || 'кг';
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.getAttribute('data-value') === unitToSelect) btn.classList.add('active');
  });
  
  document.getElementById('productModal').classList.add('active');
  document.body.classList.add('modal-open');
  setTimeout(() => document.getElementById('quantityInput').focus(), 100);
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('active');
  document.body.classList.remove('modal-open');
  selectedProduct = null;
}

async function updateProduct(isReplace) {
  const newQuantity = parseFloat(document.getElementById('quantityInput').value);
  const selectedUnitBtn = document.querySelector('.unit-btn.active');
  const newUnit = selectedUnitBtn ? selectedUnitBtn.getAttribute('data-value') : selectedProduct.unit;
  
  if (isNaN(newQuantity) || newQuantity < 0) { showNotification('Введите корректное количество', 'error'); return; }
  if (!selectedUnitBtn) { showNotification('Выберите единицу измерения', 'error'); return; }
  
  showLoader();
  const result = await callGAS('updateProductStock', {
    departmentName: currentDepartment,
    rowNumber: selectedProduct.row,
    quantity: newQuantity,
    unit: newUnit,
    isReplace: isReplace
  });
  hideLoader();
  
  if (result.success) {
    selectedProduct.stock = newQuantity;
    selectedProduct.unit = newUnit;
    renderProducts();
    showNotification(`${selectedProduct.name}: ${isReplace ? 'заменен на' : 'добавлено'} ${newQuantity} ${newUnit}`, 'success');
    closeProductModal();
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
}

// ==================== НАВИГАЦИЯ ====================
function goToStep(step) {
  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');
  const step3 = document.getElementById('step3');
  
  if (step1) step1.classList.remove('active');
  if (step2) step2.classList.remove('active');
  if (step3) step3.classList.remove('active');
  
  const activeStep = document.getElementById(`step${step}`);
  if (activeStep) activeStep.classList.add('active');
  
  currentStep = step;
  
  const sc = document.getElementById('searchContainer');
  if (step === 3) { 
    if (sc) sc.classList.add('visible'); 
    document.getElementById('mainContent').scrollTop = 0; 
  } else { 
    if (sc) sc.classList.remove('visible'); 
  }
}

function goBack() {
  if (currentStep === 3) {
    document.getElementById('headerTitle').textContent = 'Выбор цеха';
    document.getElementById('backButton').style.display = 'none';
    if (userData) {
      const filtered = userData.departments.filter(d => !TECHNICAL_SHEETS.includes(d));
      renderDepartments(filtered);
    }
    goToStep(2);
  }
}

// ==================== ЛОГАУТ ====================
function showLogoutModal() {
  document.getElementById('logoutModal').classList.add('active');
  document.body.classList.add('modal-open');
}

function closeLogoutModal() {
  document.getElementById('logoutModal').classList.remove('active');
  document.body.classList.remove('modal-open');
}

async function performLogout() {
  const allowOtherDevices = document.getElementById('allowOtherDevices').checked;
  showLoader();
  const result = await callGAS('logout', { deviceId: getDeviceId(), allowOtherDevices });
  hideLoader();
  
  if (result.success) {
    closeLogoutModal();
    userData = null;
    currentDepartment = null;
    products = [];
    filteredProducts = [];
    currentPhone = null;
    document.getElementById('authForm').reset();
    document.getElementById('headerTitle').textContent = 'Инвентаризация';
    const saved = localStorage.getItem('last_phone');
    if (saved) document.getElementById('phone').value = saved;
    document.getElementById('headerActions').style.display = 'none';
    goToStep(1);
    showNotification(result.message || 'Вы вышли', 'success');
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
}

// ==================== ЭКСПОРТ ФУНКЦИЙ ====================
window.goBack = goBack;
window.closeLogoutModal = closeLogoutModal;
window.performLogout = performLogout;
window.toggleInventory = toggleInventory;
window.startEditName = startEditName;
window.saveNameEdit = saveNameEdit;
window.cancelNameEdit = cancelNameEdit;
window.openProductModal = openProductModal;
window.updateProduct = updateProduct;

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
function hideSplash() {
  const splash = document.getElementById('splash');
  if (splash) {
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 500);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  getDeviceId();
  initUnits();
  checkSession();
  
  document.getElementById('authForm').addEventListener('submit', handleAuthSubmit);
  document.getElementById('searchInput').addEventListener('input', filterProducts);
  document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
  document.querySelector('.search-icon')?.addEventListener('click', toggleSearch);
  document.getElementById('logoutBtn').addEventListener('click', showLogoutModal);
  
  document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target === this) closeProductModal();
  });
  document.getElementById('replaceBtn').addEventListener('click', () => { if (selectedProduct) updateProduct(true); });
  document.getElementById('addBtn').addEventListener('click', () => { if (selectedProduct) updateProduct(false); });
  
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const input = document.getElementById('quantityInput');
      input.value = (parseFloat(input.value) || 0) + parseFloat(this.getAttribute('data-value'));
    });
  });
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeProductModal(); closeLogoutModal(); }
  });
  
  const savedPhone = localStorage.getItem('last_phone');
  if (savedPhone) document.getElementById('phone').value = savedPhone;
  
  setTimeout(hideSplash, 800);
});
</script>
